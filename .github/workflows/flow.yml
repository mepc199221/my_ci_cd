name: deploy

on:
  push:
    branches:
         - main

  workflow_dispatch:


jobs:
  deploy-to-vercel:
    runs-on: ubuntu-latest

    steps:
      - name: download project
        uses: actions/checkout@v5

      - name: install nodejs
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: install minifier-terser
        run: npm install html-minifier-terser -g

      - name: minify index.html
        run: |
          mkdir -p dist
          html-minifier-terser --collapse-whitespace --remove-comments --minify-js true -o dist/index.html index.html

      - name: deploy to vercel
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: --prod
          vercel-org-id: ${{ secrets.VERCEL_USER_ID}}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID}}
          working-directory: ./dist
